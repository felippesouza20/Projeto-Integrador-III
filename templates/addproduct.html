{% extends "base.html" %}
{% block content %}

<div class="card-custom">

    <h2 class="text-center mb-4">➕ Cadastrar Produto</h2>

    {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
            {% for categoria, msg in mensagens %}
                <div class="alert alert-{{ categoria }} alert-dismissible fade show">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label>Código</label>
            <input type="text" name="codigo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Produto</label>
            <input type="text" name="produto" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Quantidade em Estoque</label>
            <input type="number" name="quantidade" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Validade</label>
            <input type="text" name="validade" class="form-control" placeholder="Ex: 12/2026">
        </div>

        <div class="mb-3">
            <label>Preço (R$)</label>
            <input type="number" step="0.01" name="preco" class="form-control">
        </div>

        <div class="mb-3">
            <label>Comentário</label>
            <textarea name="comentario" class="form-control" rows="3"></textarea>
        </div>

        <div class="text-center">
            <button class="btn btn-primary">Salvar</button>
            <a href="{{ url_for('index') }}" class="btn-secondary">Voltar</a>
        </div>

    </form>

</div>

{% endblock %}
