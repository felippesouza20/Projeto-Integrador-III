{% extends "history.html" %}

{% block content %}
<div class="container mt-4">
    <h2>✏️ Editar Produto</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Código:</label>
            <input type="text" name="codigo" value="{{ item.codigo }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Produto:</label>
            <input type="text" name="produto" value="{{ item.produto }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Quantidade em Estoque:</label>
            <input type="number" name="quantidade" value="{{ item.quantidade_estoque }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Validade:</label>
            <input type="text" name="validade" value="{{ item.validade }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Preço:</label>
            <input type="number" step="0.01" name="preco" value="{{ item.preco }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Comentário:</label>
            <textarea name="comentario" class="form-control">{{ item.comentario }}</textarea>
        </div>

        <button type="submit" class="btn btn-success">💾 Salvar Alterações</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">↩️ Voltar</a>
    </form>
</div>
{% endblock content %}
