<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/superhero/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a href="{{ url_for('lista') }}" class="btn btn-light btn-sm">
            ⬅ Voltar
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header text-center bg-warning text-dark">
            <h4>✏️ Editar Produto</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Código</label>
                    <input type="text" name="codigo" value="{{ item.codigo }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Produto</label>
                    <input type="text" name="produto" value="{{ item.produto }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Quantidade</label>
                    <input type="number" name="quantidade" value="{{ item.quantidade_estoque }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Validade</label>
                    <input type="text" name="validade" value="{{ item.validade }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Preço</label>
                    <input type="number" step="0.01" name="preco" value="{{ item.preco }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Comentário</label>
                    <textarea name="comentario" class="form-control">{{ item.comentario }}</textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('lista') }}" class="btn btn-secondary">
                        ❌ Cancelar
                    </a>

                    <button type="submit" class="btn btn-success">
                        💾 Salvar
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
