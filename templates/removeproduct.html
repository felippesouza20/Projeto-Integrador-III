<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Remover Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <div class="d-flex">
                <a href="{{ url_for('index') }}" class="btn btn-light btn-sm me-2" style="position: relative; top: 0px; left: 1450px;">⬅ Voltar à Lista</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white text-center">
                <h4>Remover Produto</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('removeproduct', id=item.id) }}" method="POST" class="needs-validation" novalidate>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Produto:</label>
                            <input type="text" class="form-control" value="{{ item.produto }}" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Código:</label>
                            <input type="text" class="form-control" value="{{ item.codigo }}" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Estoque Atual:</label>
                            <input type="text" class="form-control" value="{{ item.quantidade_estoque }}" readonly>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Quantidade a Retirar:</label>
                            <input type="number" name="quantidade" class="form-control" min="1" max="{{ item.quantidade_estoque }}" required>
                            <div class="invalid-feedback">Informe uma quantidade válida.</div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Responsável pela Saída:</label>
                            <input type="text" name="responsavel" class="form-control" placeholder="Nome do responsável" required>
                            <div class="invalid-feedback">Informe o nome do responsável.</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            ❌ Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            ✅ Confirmar Saída
                        </button>
                    </div>
                </form>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mt-4">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validação de formulário (Bootstrap)
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
