<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Saída de Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/superhero/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a href="{{ url_for('lista') }}" class="btn btn-light btn-sm">
            ⬅ Voltar
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header text-center bg-info text-white">
            <h4>📤 Saída de Produto</h4>
        </div>

        <div class="card-body">

            <form action="{{ url_for('saida_produto', id=item.id) }}" method="POST">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label>Produto</label>
                        <input type="text" class="form-control" value="{{ item.produto }}" readonly>
                    </div>

                    <div class="col-md-3">
                        <label>Código</label>
                        <input type="text" class="form-control" value="{{ item.codigo }}" readonly>
                    </div>

                    <div class="col-md-3">
                        <label>Estoque</label>
                        <input type="text" class="form-control" value="{{ item.quantidade_estoque }}" readonly>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label>Quantidade</label>
                        <input type="number" name="quantidade" class="form-control" required>
                    </div>

                    <div class="col-md-8">
                        <label>Responsável</label>
                        <input type="text" name="responsavel" class="form-control" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('lista') }}" class="btn btn-secondary">
                        ❌ Cancelar
                    </a>

                    <button type="submit" class="btn btn-success">
                        ✅ Confirmar
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- Mensagens -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mt-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

</div>

</body>
</html>
